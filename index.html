<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MSc Amila | Kinetic Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #05070a; color: #e2e8f0; font-family: sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        input[type="range"] { accent-color: #3b82f6; cursor: pointer; }
    </style>
</head>
<body class="p-6 min-h-screen flex flex-col items-center">

    <div class="w-full max-w-6xl glass rounded-3xl p-8 shadow-2xl">
        <div class="flex justify-between items-center mb-10 border-b border-slate-700 pb-6">
            <div>
                <h1 class="text-2xl font-black tracking-tighter uppercase">MSc <span class="text-blue-500">Amila Dubravac Kaplan</span></h1>
                <p class="text-[10px] text-slate-500 font-mono italic uppercase tracking-[0.3em]">Kinetic Reactor Pilot v1.0</p>
            </div>
            <div class="text-right">
                <span class="px-3 py-1 bg-blue-600/20 text-blue-400 rounded-full text-[10px] font-bold tracking-widest uppercase border border-blue-500/30">Verified Model ✓</span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            <div class="space-y-8">
                <div class="bg-slate-900/50 p-6 rounded-2xl border border-slate-800">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-4 italic">Energy of Activation (Ea)</label>
                    <input type="range" id="ea" min="30" max="100" value="50" class="w-full" oninput="runSim()">
                    <div class="flex justify-between mt-2 text-blue-400 font-bold mono"><span id="eaVal">50</span> kJ/mol</div>
                </div>

                <div class="bg-slate-900/50 p-6 rounded-2xl border border-slate-800 text-center">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-4 italic italic">Rate Constant (k)</label>
                    <div id="kRes" class="text-4xl font-black text-white font-mono tracking-tighter">--</div>
                    <p class="text-[10px] text-slate-600 mt-2 tracking-widest font-bold uppercase">Sec⁻¹</p>
                </div>
                
                <button onclick="window.print()" class="w-full py-4 rounded-xl border border-slate-700 hover:bg-blue-600 hover:border-blue-500 transition-all font-bold text-xs uppercase tracking-[0.2em]">Generate Report</button>
            </div>

            <div class="lg:col-span-2 glass rounded-2xl p-6 h-[400px]">
                <canvas id="kinChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('kinChart').getContext('2d');
        let chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array.from({length: 101}, (_, i) => i + 's'),
                datasets: [{
                    label: 'Concentration [A]',
                    borderColor: '#3b82f6',
                    borderWidth: 4,
                    pointRadius: 0,
                    fill: true,
                    backgroundColor: 'rgba(59, 130, 246, 0.05)',
                    data: []
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } },
                    x: { grid: { display: false }, ticks: { color: '#64748b', maxRotation: 0 } }
                }
            }
        });

        function runSim() {
            const Ea = document.getElementById('ea').value;
            const T = 350; // Fiksna temperatura za preglednost
            const k = 1000000 * Math.exp(-(Ea * 1000) / (8.314 * T));
            
            document.getElementById('eaVal').innerText = Ea;
            document.getElementById('kRes').innerText = k.toExponential(2);

            let data = [];
            for(let t = 0; t <= 100; t++) {
                data.push(Math.exp(-k * t));
            }
            chart.data.datasets[0].data = data;
            chart.update();
        }

        window.onload = runSim;
    </script>
</body>
</html>

    </script>
</body>
</html>
